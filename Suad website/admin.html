<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>لوحة الإدارة – د. سعاد عويض</title>
    <style>
      body {
        font-family: "Segoe UI", Arial, sans-serif;
        margin: 0;
        background-color: #f0f2f5;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      header {
        width: 100%;
        background-color: #34a89d;
        color: white;
        padding: 30px 0;
        text-align: center;
        margin-bottom: 20px;
      }

      .container {
        width: 95%;
        max-width: 1200px;
        background: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      }

      h2 {
        color: #34a89d;
        margin-top: 0;
        border-bottom: 2px solid #eee;
        padding-bottom: 10px;
      }

      /* تنسيق الحاوية للجدول */
      .sheet-wrapper {
        width: 100%;
        height: 600px; /* يمكنك التحكم في طول الجدول من هنا */
        border: 1px solid #ddd;
        border-radius: 5px;
        overflow: hidden;
      }

      iframe {
        width: 100%;
        height: 100%;
        border: none;
      }

      footer {
        padding: 20px;
        color: #888;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>لوحة الإدارة – د. سعاد عويض</h1>
    </header>

    <div class="container">
      <h2>استشارات الزوار</h2>

      <div class="sheet-wrapper">
        <iframe
          src="https://docs.google.com/spreadsheets/d/1xc08s_F-fdn2zDjl2CmRGdD4IHiH8TlQqc76lv3iBgg/preview"
        >
        </iframe>
      </div>
    </div>

    <footer>© د. سعاد عويض – جميع الحقوق محفوظة</footer>
  </body>
</html>
