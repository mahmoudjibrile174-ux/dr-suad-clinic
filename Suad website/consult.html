<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <title>طلب استشارة جلدية مجانية</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header>
      <h1>طلب استشارة جلدية مجانية</h1>
    </header>

    <section>
      <form id="consultForm">
        <input type="text" name="name" placeholder="الاسم" required />
        <input type="number" name="age" placeholder="العمر" />
        <select name="gender">
          <option value="">اختر الجنس</option>
          <option value="ذكر">ذكر</option>
          <option value="أنثى">أنثى</option>
        </select>
        <textarea name="problem" placeholder="وصف المشكلة" required></textarea>
        <input type="email" name="email" placeholder="البريد الإلكتروني" />
        <button type="submit">إرسال الطلب</button>
      </form>
    </section>

    <footer style="color: black">© د. سعاد عويض</footer>
    <script src="js/main.js"></script>
  </body>
</html>
